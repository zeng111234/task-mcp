# ============================================================
# Reasonix Workflow — 三阶段 AI Harness
# analyze → code → verify（人工确认）→ 循环 or 完成
# ============================================================

stages:
  - name: analyze
    description: "理解任务，读代码，制定方案"
    allowed_tools:
      - read_file
      - list_directory
      - directory_tree
      - glob
      - search_content
      - search_files
      - get_file_info
    next: code
    auto_advance: true

  - name: code
    description: "写代码、改文件、跑命令"
    allowed_tools:
      - read_file
      - write_file
      - edit_file
      - multi_edit
      - create_directory
      - delete_file
      - move_file
      - copy_file
      - run_command
      - run_background
      - glob
      - search_content
      - search_files
    next: verify
    auto_advance: false

  - name: verify
    description: "跑测试、构建、展示结果，等人工确认"
    allowed_tools:
      - read_file
      - glob
      - search_content
      - search_files
      - run_command
    require_approval: true
    approval_options:
      - label: "✅ 合格"
        value: "approve"
        next: code
      - label: "❌ 不合格"
        value: "reject"
        next: code
      - label: "⚡ 自动模式"
        value: "auto"
        skip_approval: true
